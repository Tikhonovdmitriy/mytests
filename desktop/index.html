<!DOCTYPE html>
<html lang="ru">
<head>
    <script src="http://code.jquery.com/jquery-1.11.0.min.js"></script>
    <style>
        body {padding: 0px; margin:0px; overflow:hidden!important;}
     

        #main_container 
        {overflow:hidden!important;
         width: 100%;
         height: 100%;
         display: block;
        }

 #play_btn:hover
 { width: 160px;
    height: 160px; margin-top: -2.5%;} 

       #play_btn 
{transition: all 0.1s ease-out;
    background-color:#ffffff;
    border-radius: 100%;
    width: 140px;
    height: 140px;
    left: 50%;
        top:50%;
        transform: translate(-50%);
        margin-top: -2%;
    position: absolute;
 
    z-index: 2;
}
       video {
          bottom: 0;
    height: 100%;
    left: 50%;
    position: absolute;
    transform: translate(-50%);
    width: auto!important;
    z-index: 1;
       }

     .icon { 
    position: absolute;
    left: 50%;
    top:50%;
    margin-top: -50px;
    transform: translate(-50%);
    width: 100px;
    height: 100px;

}

 #play_btn:hover .icon {width: 120px;
    height: 120px; 
    margin-top: -60px;
    cursor: pointer;
    }

 </style>
</head>
<body>
   
 
<div id="main_container">
<video autoplay muted  loop src="video.mp4">
</div>
 
</body>
</html>
